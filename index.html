<index.html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>❤️</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, 'PingFang SC','Microsoft YaHei', sans-serif;
    background: linear-gradient(145deg, #fce4ec 0%, #f8e8e0 40%, #fff0f0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    padding: 20px;
}

/* 飘落的小爱心 */
.hearts {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
}
.heart {
    position: absolute;
    top: -20px;
    font-size: 14px;
    animation: fall linear infinite;
    opacity: 0.5;
}
@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}

.card {
    position: relative;
    z-index: 1;
    text-align: center;
    animation: fadeInUp 1.5s ease-out;
}

@keyframes fadeInUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* 大爱心 */
.big-heart {
    font-size: 80px;
    display: block;
    margin-bottom: 20px;
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

/* 主文字 */
.main-text {
    font-size: 28px;
    font-weight: 600;
    color: #d4536a;
    letter-spacing: 4px;
    line-height: 1.8;
    margin-bottom: 12px;
}

/* 每一行依次出现 */
.line {
    opacity: 0;
    animation: fadeIn 1s ease-out forwards;
}
.line:nth-child(1) { animation-delay: 0.5s; }
.line:nth-child(2) { animation-delay: 1.8s; }
.line:nth-child(3) { animation-delay: 3.1s; }
.line:nth-child(4) { animation-delay: 4.4s; }
.line:nth-child(5) { animation-delay: 5.7s; }

@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
}

.sub-text {
    font-size: 15px;
    color: #c48a8a;
    letter-spacing: 2px;
    margin-top: 24px;
    opacity: 0;
    animation: fadeIn 1.5s ease-out 6.5s forwards;
}

/* 底部小字 */
.footer {
    position: fixed;
    bottom: 30px;
    font-size: 12px;
    color: #d4b0b0;
    letter-spacing: 2px;
    z-index: 1;
    animation: fadeIn 2s ease-out 7s forwards;
    opacity: 0;
}

/* 闪烁的小星星 */
.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #f5c8d0;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.3); }
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card">
    <span class="big-heart">💗</span>
    <div class="main-text">
        <div class="line">你是我</div>
        <div class="line">每天醒来第一个想到的人</div>
        <div class="line">也是睡前</div>
        <div class="line">最后一个舍不得放下的人</div>
        <div class="line">❤️ 我好喜欢你 ❤️</div>
    </div>
    <div class="sub-text">—— 永远属于你的</div>
</div>

<div class="footer">from Fang 💕</div>

<script>
// 飘落的爱心
var hearts = ['❤️', '💕', '💗', '💖', '🩷'];
var container = document.getElementById('hearts');
for (var i = 0; i < 25; i++) {
    var el = document.createElement('div');
    el.className = 'heart';
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (10 + Math.random() * 16) + 'px';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    el.style.animationDelay = Math.random() * 10 + 's';
    container.appendChild(el);
}

// 闪烁小星星
for (var i = 0; i < 15; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 4 + 's';
    s.style.width = s.style.height = (3 + Math.random() * 5) + 'px';
    document.body.appendChild(s);
}
</script>
</body>
</html>
